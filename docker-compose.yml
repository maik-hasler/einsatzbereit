services:
  
  postgres:
    container_name: postgres
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - 5432:5432
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      
  pgadmin:
    image: dpage/pgadmin4
    pull_policy: always
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_DISABLE_POSTFIX: 'True'
    entrypoint: /bin/sh -c "chmod 600 /pgpass; /entrypoint.sh;"
    user: root
    ports:
      - 5050:80
    configs:
      - source: servers.json
        target: /pgadmin4/servers.json
      - source: pgpass
        target: /pgpass
        
  keycloak:
    build:
      context: ./keycloak
      dockerfile: Dockerfile.integration
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME: http://localhost:8080
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: [ "--import-realm" ]
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "4321:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/"]
      interval: 5s
      timeout: 10s
      retries: 10
    depends_on:
      - backend
      - keycloak

volumes:
  postgres_data:
  pgadmin_data:

configs:
  pgpass:
    content: |
      postgres:5432:*:postgres:postgres
  servers.json:
    content: |
      {
        "Servers":{
            "1":{
              "Group":"Servers",
              "Name":"Local",
              "Host":"postgres",
              "Port":5432,
              "MaintenanceDB":"postgres",
              "Username":"postgres",
              "PassFile":"/pgpass",
              "SSLMode":"prefer"
            }
        }
      }
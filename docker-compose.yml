services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: einsatzbereit
      POSTGRES_USER: einsatzbereit
      POSTGRES_PASSWORD: einsatzbereit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    build: ./keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/einsatzbereit
      KC_DB_USERNAME: einsatzbereit
      KC_DB_PASSWORD: einsatzbereit
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: ["start", "--optimized", "--import-realm"]
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Authentication__Authority: http://keycloak:8080/realms/einsatzbereit
      ConnectionStrings__DefaultConnection: Host=postgres;Database=einsatzbereit;Username=einsatzbereit;Password=einsatzbereit
    ports:
      - "5000:8080"
    depends_on:
      - postgres
      - keycloak

  frontend:
    build: ./frontend
    environment:
      API_URL: http://backend:8080
    ports:
      - "4321:4321"
    depends_on:
      - backend

volumes:
  postgres-data:

name: Publish Frontend

on:
  push:
    tags:
      - 'frontend/v[0-9]*.[0-9]*.[0-9]*'
      - 'frontend/v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    # Pin the compose project name so `docker buildx bake` and `docker compose up`
    # agree on image tags (both default to <project-name>-<service>).
    env:
      COMPOSE_PROJECT_NAME: einsatzbereit
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # Postgres comes as a pre-built `image:` (not built via bake), so the bake
      # layer cache doesn't cover it. Cache the image tar explicitly — cold pull
      # is ~2 min; warm load from cache is a few seconds.
      - name: Cache postgres image
        id: postgres-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/docker-images/postgres-18.tar
          key: docker-image-postgres-18

      - name: Load postgres image from cache
        if: steps.postgres-cache.outputs.cache-hit == 'true'
        run: docker load -i ~/.cache/docker-images/postgres-18.tar

      - name: Pull postgres image
        if: steps.postgres-cache.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:18
          mkdir -p ~/.cache/docker-images
          docker save postgres:18 -o ~/.cache/docker-images/postgres-18.tar

      - name: Build images with GHA layer cache
        uses: docker/bake-action@v6
        with:
          files: docker-compose.yml
          targets: |
            backend
            keycloak
            frontend
          load: true
          # Per-target scopes so independent images don't poison each other's cache
          # and so the publish job below reuses `scope=frontend`.
          set: |
            backend.cache-from=type=gha,scope=backend
            backend.cache-to=type=gha,scope=backend,mode=max
            keycloak.cache-from=type=gha,scope=keycloak
            keycloak.cache-to=type=gha,scope=keycloak,mode=max
            frontend.cache-from=type=gha,scope=frontend
            frontend.cache-to=type=gha,scope=frontend,mode=max

      - name: Start services
        # Skip pgadmin (pull_policy: always, not used by tests).
        # docker-compose.ci.yml overrides Keycloak to KC_DB=dev-mem (no postgres dep).
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --no-build --wait postgres keycloak backend frontend

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: pnpm build
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps
        working-directory: frontend

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: frontend

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/frontend/v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

          if echo "$TAG" | grep -qE '-rc\.'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.prerelease == 'false' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

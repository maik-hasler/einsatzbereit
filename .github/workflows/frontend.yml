name: Build and Test Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

  build:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  tests:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/src/Api/Dockerfile
          load: true
          tags: einsatzbereit-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build keycloak image
        uses: docker/build-push-action@v7
        with:
          context: ./keycloak
          file: ./keycloak/Dockerfile.integration
          load: true
          tags: einsatzbereit-keycloak:latest
          cache-from: type=gha,scope=keycloak
          cache-to: type=gha,mode=max,scope=keycloak

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          tags: einsatzbereit-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          COMPOSE_PROJECT_NAME: einsatzbereit

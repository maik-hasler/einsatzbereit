name: Build and Test Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

  build:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  tests:
    runs-on: ubuntu-latest
    needs: build
    # Pin the compose project name so `docker buildx bake` and `docker compose up`
    # agree on image tags (both default to <project-name>-<service>).
    env:
      COMPOSE_PROJECT_NAME: einsatzbereit
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # Postgres comes as a pre-built `image:` (not built via bake), so the bake
      # layer cache doesn't cover it. Cache the image tar explicitly — cold pull
      # is ~2 min; warm load from cache is a few seconds.
      - name: Cache postgres image
        id: postgres-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/docker-images/postgres-18.tar
          key: docker-image-postgres-18

      - name: Load postgres image from cache
        if: steps.postgres-cache.outputs.cache-hit == 'true'
        run: docker load -i ~/.cache/docker-images/postgres-18.tar

      - name: Pull postgres image
        if: steps.postgres-cache.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:18
          mkdir -p ~/.cache/docker-images
          docker save postgres:18 -o ~/.cache/docker-images/postgres-18.tar

      - name: Build images with GHA layer cache
        uses: docker/bake-action@v6
        with:
          files: docker-compose.yml
          targets: |
            backend
            keycloak
            frontend
          load: true
          # Per-target scopes so independent images don't poison each other's cache
          # and so the frontend-publish workflow can reuse `scope=frontend`.
          set: |
            backend.cache-from=type=gha,scope=backend
            backend.cache-to=type=gha,scope=backend,mode=max
            keycloak.cache-from=type=gha,scope=keycloak
            keycloak.cache-to=type=gha,scope=keycloak,mode=max
            frontend.cache-from=type=gha,scope=frontend
            frontend.cache-to=type=gha,scope=frontend,mode=max

      - name: Start services
        # Skip pgadmin (pull_policy: always, not used by tests).
        run: docker compose up -d --no-build --wait postgres keycloak backend frontend

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps
        working-directory: frontend

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: pnpm test:e2e
        working-directory: frontend

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 7

name: Build and Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get revision info
        id: revision
        run: |
          echo "revnumber=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          echo "revremark=$(git log -1 --format=%s)" >> "$GITHUB_OUTPUT"
          echo "revdate=$(date +%d.%m.%Y)" >> "$GITHUB_OUTPUT"

      - name: Build AsciiDoc
        uses: tonynv/asciidoctor-action@v2
        with:
          program: |
            asciidoctor \
              -r asciidoctor-diagram \
              -a imagesdir=images \
              -a revnumber="${{ steps.revision.outputs.revnumber }}" \
              -a revdate="${{ steps.revision.outputs.revdate }}" \
              -a revremark="${{ steps.revision.outputs.revremark }}" \
              -b html5 \
              -D build \
              docs/Architektur/Architektur.adoc
            cp -r docs/Architektur/images build/images

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

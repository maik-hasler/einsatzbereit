name: Bug Report
description: Melde einen Fehler
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: dropdown
    id: persona
    attributes:
      label: Betroffene Persona
      description: Wer ist von diesem Fehler betroffen?
      options:
        - Volunteer Vera
        - Organizer Olaf
        - Contributor Caro
        - Maintainer Milo
        - Alle
    validations:
      required: true

  - type: dropdown
    id: prioritaet
    attributes:
      label: Priorität
      options:
        - Niedrig
        - Mittel
        - Hoch
    validations:
      required: true

  - type: textarea
    id: beschreibung
    attributes:
      label: Beschreibung
      description: Was passiert und was sollte stattdessen passieren?
      placeholder: |
        **Tatsächliches Verhalten:** Was passiert gerade?
        **Erwartetes Verhalten:** Was sollte stattdessen passieren?
    validations:
      required: true

  - type: textarea
    id: reproduktion
    attributes:
      label: Schritte zur Reproduktion
      description: So lässt sich der Fehler nachstellen
      placeholder: |
        1. Schritt 1
        2. Schritt 2
        3. Schritt 3
    validations:
      required: true

  - type: textarea
    id: umgebung
    attributes:
      label: Umgebung
      description: In welcher Umgebung tritt der Fehler auf?
      placeholder: |
        - Browser / Version:
        - Betriebssystem:
        - Einsatzbereit-Version / Branch:

  - type: textarea
    id: extra
    attributes:
      label: Zusätzliche Informationen
      placeholder: Screenshots, Logs, Links, Kontext

name: Bug Report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: dropdown
    id: persona
    attributes:
      label: Affected Persona
      description: Who is affected by this bug?
      options:
        - Volunteer Vera
        - Organizer Olaf
        - Contributor Caro
        - Maintainer Milo
        - All
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happens and what should happen instead?
      placeholder: |
        **Actual behaviour:** What is currently happening?
        **Expected behaviour:** What should happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can the bug be reproduced?
      placeholder: |
        1. Step 1
        2. Step 2
        3. Step 3
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: In which environment does the bug occur?
      placeholder: |
        - Browser / Version:
        - Operating System:
        - Einsatzbereit Version / Branch:

  - type: textarea
    id: extra
    attributes:
      label: Additional Information
      placeholder: Screenshots, logs, links, context
